apiVersion: 1

providers:
  - name: "Stack Dashboards"
    orgId: 1
    folder: "Observability Core"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/core

  - name: "Dermagroup"
    orgId: 1
    folder: "Dermagroup"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/dermagroup

  - name: "Heyyou"
    orgId: 1
    folder: "Heyyou"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/heyyou

  - name: "TodoMercado"
    orgId: 1
    folder: "TM"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/tm-one

  - name: "Apacha"
    orgId: 1
    folder: "Apacha"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/apacha

  - name: "Cheese ERP"
    orgId: 1
    folder: "Cheese ERP"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/cheese-erp

  # Legacy cleanup provider: removes old dashboards provisioned years ago under
  # provider name "Lambda Dashboards" that are still locked as provisioned.
  - name: "Lambda Dashboards"
    orgId: 1
    folder: "Legacy Cleanup"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/_cleanup/legacy-lambda
