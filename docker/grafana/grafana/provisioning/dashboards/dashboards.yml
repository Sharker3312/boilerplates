apiVersion: 1

providers:
  - name: "Stack Dashboards"
    orgId: 1
    folder: "Observability Core"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/core

  - name: "TodoMercado"
    orgId: 1
    folder: "TM"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/lambda
