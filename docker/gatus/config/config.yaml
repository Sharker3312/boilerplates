web:
  port: 8080

storage:
  type: sqlite
  path: /data/data.db

endpoints:
  - name: Apacha - Bot
    group: Bot
    url: "https://apachabot.deepzide.com/"
    interval: 1m
    conditions:
      - "[STATUS] == 200"
  - name: Cheese - Bot 
    group: Bot
    url: "https://cheese-bot.deepzide.com/"
    interval: 1m
    conditions:
      - "[STATUS] == 200"
  - name: Viventi - Bot
    group: Bot
    url: "https://bot.viventi.app/"
    interval: 1m
    conditions:
      - "[STATUS] == 200"
  - name: Apacha - Staging
    group: ERP
    url: "https://erp-apacha-dev.deepzide.com"
    interval: 1m
    conditions:
      - "[STATUS] == 200"
  - name: Dermagroup - Prod
    group: ERP
    url: "https://erp-dermagroup.deepzide.com"
    interval: 1m
    conditions:
      - "[STATUS] == 200"
  - name: Dermagroup - Dev
    group: ERP
    url: "https://erp-dermagroup-dev.deepzide.com"
    interval: 1m
    conditions:
      - "[STATUS] == 200"
  - name: Cheese - Prod
    group: ERP
